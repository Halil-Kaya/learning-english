server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;
    charset utf-8;

    # Kelime/set dosyaları sık düzenleniyor → cache'i kapat,
    # böylece dosyayı değiştirip sayfayı yenileyince yeni hâli gelir.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }
}
